<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,300;0,400;1,300&family=Montserrat:wght@300;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Minimal Nature Template</title>
  </head>
  <body>
    <main id="box-principal">
      <div id="row-1">
        <div class="content" id="box1">
          <h5>mantenha seu amor de</h5>
          <h2>natureza</h2>
        </div>
        <div class="content" id="box2">
          <img src="assets/images/img-logo.png" alt="" />
        </div>
        <div class="content" id="box3">
          <img src="assets/images/paisagem-img.jpg" alt="imagem-ilustrativa" />
        </div>
      </div>
      <div id="row-2">
        <div class="content" id="box4">
          <div class="caixa-texto-branco">
            <p>
              Quando as palavras se tornam confusas, devo me concentrar nas
              fotografias. Quando as imagens se tornam inadequadas, devo me
              contentar com o silêncio.
            </p>
          </div>
          <div class="caixa-texto-branco sub-texto">
            <p>
              Sample text. Lorem ipsum dolor sit amet, consectetur adipiscing
              elit nullam nunc justo sagittis suscipit ultrices.
            </p>
          </div>
        </div>
        <div class="content" id="box5">
          <img src="assets/images/zebra-img.jpg" alt="imagem-ilustrativa" />
        </div>
        <div class="content" id="box6">
          <div class="redes-sociais">
            <a href="#" target="_blank"
              ><i class="fa-brands fa-facebook-f"></i
            ></a>
            <a href="#" target="_blank"><i class="fa-brands fa-twitter"></i></a>
            <a href="#" target="_blank"
              ><i class="fa-brands fa-instagram"></i
            ></a>
            <a href="#" target="_blank"><i class="fa-brands fa-youtube"></i></a>
            <a href="#" target="_blank"
              ><i class="fa-brands fa-pinterest-p"></i
            ></a>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
